name: Monthly Stock Data One-Stop Pipeline

on:
  workflow_dispatch: # 手动启动

env:
  REGISTRY: crpi-078q63v9lsxo0yds.cn-guangzhou.personal.cr.aliyuncs.com
  NAMESPACE: yahoo_data
  IMAGE: yahoo_data
  TAG: latest

jobs:
  all-in-one-processing:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 3. 安装所有依赖
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance duckdb python-dateutil openpyxl llama-index-core llama-index-embeddings-dashscope llama-index-llms-openai langchain-openai langchain-community faiss-cpu

      - name: 4. 执行数据流 (下载 -> 质检 -> Check)
        run: |
          python 1.yahoo_data_download.py
          python 2.QC.py
          python 3.check.py

      - name: 5. 构建 RAG 向量索引
        env:
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
        run: python 5.rag_setup.py

      - name: 6. 上传所有文件
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Full-Monthly-Assets
          path: |
            yahoo_stock_data.duckdb
            llama_index_stock_index/
            QC_Full_Report_*.xlsx

  build-and-push:
    runs-on: ubuntu-latest
    needs: all-in-one-processing
    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
      
      - name: 2. 下载上一步生成的数据库和索引
        uses: actions/download-artifact@v4
        with:
          name: Full-Monthly-Assets

      - name: 3. 登录阿里云并推送镜像
        run: |
          echo "${{ secrets.TCR_TOKEN }}" | docker login --username=nick4826144284 ${{ env.REGISTRY }} --password-stdin
          docker build -t ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ env.TAG }} .
          docker push ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ env.IMAGE }}:${{ env.TAG }}
